<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiards Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div class="player">Player 1: <span id="player1-score">0</span></div>
            <div class="player">Player 2: <span id="player2-score">0</span></div>
            <button id="reset-game">Reset Game</button>
        </div>
        <div class="table-container">
            <canvas id="billiards-table"></canvas>
        </div>
    </div>
    
    <!-- Webpack will inject the bundled script here -->
</body>
</html>
