<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiards Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div class="player">Player 1: <span id="player1-score">0</span></div>
            <div class="player">Player 2: <span id="player2-score">0</span></div>
            <button id="reset-game">Reset Game</button>
        </div>
        <div class="table-container">
            <canvas id="billiards-table"></canvas>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/box2dweb@2.1.0-b/box2d.js"></script>
    <script src="script.js"></script>
</body>
</html>
